name: Sales Value Classification — CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
  DAGSHUB_TOKEN:    ${{ secrets.DAGSHUB_TOKEN }}
  DOCKER_IMAGE:     ghcr.io/rfer7935/mlops-experiment

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint & Setup
  # ─────────────────────────────────────────────
  lint-and-setup:
    name: Lint & Setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  # ─────────────────────────────────────────────
  # JOB 2: Train & Log to DagsHub
  # ─────────────────────────────────────────────
  train-and-log:
    name: Train & Log to DagsHub MLflow
    runs-on: ubuntu-latest
    needs: lint-and-setup
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model & log to DagsHub
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/MLOps-Experiment.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd Workflow-CI/MLProject
          python modelling.py \
            --data_path ../../Membangun_model/data_penjualan_preprocessed/preprocessed.csv \
            --n_estimators 100 \
            --max_depth 10 \
            --min_samples_split 2

      - name: Commit trained model to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Workflow-CI/MLProject/outputs/rf_model.pkl
          git diff --staged --quiet || git commit -m "ci: update trained model [skip ci]"
          git push

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: Workflow-CI/MLProject/outputs/rf_model.pkl

  # ─────────────────────────────────────────────
  # JOB 3: Build & Push Docker Image
  # ─────────────────────────────────────────────
  build-and-push-docker:
    name: Build & Push to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: train-and-log
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: Workflow-CI/MLProject/outputs/

      - name: Fix DNS resolution
        run: |
          echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          echo "nameserver 8.8.4.4" | sudo tee -a /etc/resolv.conf

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:latest \
                       -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:latest
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
